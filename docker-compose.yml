version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://demo_user:password@db:5432/campaign_db
      - JWT_SECRET=super_secret_jwt_key_987654321
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=demo_user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=campaign_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user -d campaign_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
